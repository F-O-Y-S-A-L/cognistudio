<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Ultra-vibrant glow filter for that instant eye-catching look -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for 3D depth & high saturation -->
    <linearGradient id="cyberPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007A" /> <!-- Hot Pink/Magenta -->
      <stop offset="100%" stop-color="#7928CA" /> <!-- Deep Royal Purple -->
    </linearGradient>

    <linearGradient id="neonCyan" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00DF89" /> <!-- Neon Green/Emerald -->
      <stop offset="50%" stop-color="#00F0FF" /> <!-- Electric Cyan -->
      <stop offset="100%" stop-color="#0072FF" /> <!-- Intense Blue -->
    </linearGradient>

    <linearGradient id="goldOrange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F" /> <!-- Sunset Red -->
      <stop offset="100%" stop-color="#F09819" /> <!-- Electric Gold -->
    </linearGradient>
  </defs>

  <!-- Solid/Semi-translucent dark structural backing so it renders perfectly on both light and dark browser tabs -->
  <rect x="16" y="16" width="480" height="480" rx="140" fill="#09090B" stroke="#1F1F23" stroke-width="4" />

  <!-- 3D Overlapping Abstract "Infinity Ribbon / Vortex Star" Geometry -->
  <g filter="url(#neonGlow)">
    <!-- Loop 1: Cyan/Blue Deep Curve representing 3D Flow (Silk Wave & Mesh) -->
    <path d="M 120,380 C 40,260 120,120 256,120 C 392,120 420,220 380,300 C 340,380 220,410 160,340" 
          fill="none" 
          stroke="url(#neonCyan)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.95" />

    <!-- Loop 2: Cyber Magenta Ribbon twisting dynamically across the center -->
    <path d="M 392,132 C 472,252 392,392 256,392 C 120,392 92,292 132,212 C 172,132 292,102 352,172" 
          fill="none" 
          stroke="url(#cyberPink)" 
          stroke-width="26" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.95" />

    <!-- Loop 3: Golden Accent Ribbon (adds dramatic contrast, catches the eye immediately) -->
    <path d="M 210,160 C 290,110 370,190 340,270 C 300,370 170,350 180,250 C 190,150 280,180 300,220" 
          fill="none" 
          stroke="url(#goldOrange)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="1" />
  </g>

  <!-- Interactive Dot Matrix Core / Neural Connections (Represents Mosaic & Generative Nodes) -->
  <g>
    <!-- Core high-contrast bright white glowing nodes -->
    <circle cx="256" cy="256" r="16" fill="#FFFFFF" filter="url(#neonGlow)" />
    <circle cx="256" cy="256" r="10" fill="#FF007A" />

    <circle cx="150" cy="180" r="12" fill="#00F0FF" filter="url(#neonGlow)" />
    <circle cx="362" cy="332" r="12" fill="#FF512F" filter="url(#neonGlow)" />
    <circle cx="340" cy="150" r="10" fill="#7928CA" filter="url(#neonGlow)" />
    <circle cx="172" cy="362" r="10" fill="#00DF89" filter="url(#neonGlow)" />

    <!-- Fine sparkling digital vectors connecting them -->
    <line x1="150" y1="180" x2="256" y2="256" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="6 8" opacity="0.6" />
    <line x1="362" y1="332" x2="256" y2="256" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="6 8" opacity="0.6" />
  </g>
</svg>
