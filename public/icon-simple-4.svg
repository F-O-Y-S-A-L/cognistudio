<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Simple Icon 4: Clean Dual-Gradient Ribbon Loop (মিনিমাল টুয়িন রিবন লুপ) -->
  <defs>
    <linearGradient id="ribbonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="ribbonPurple" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="130" fill="#09090B" stroke="#27272A" stroke-width="4" />
  <g transform="translate(256, 256)">
    <!-- Symmetric looping modern geometry -->
    <path d="M -100,-60 Q -150,0 -100,60 T 100,60 Q 150,0 100,-60 T -100,-60 Z" fill="none" stroke="url(#ribbonCyan)" stroke-width="26" stroke-linecap="round" />
    <path d="M -60,100 Q 0,150 60,100 T 60,-100 Q 0,-150 -60,-100 T -60,100 Z" fill="none" stroke="url(#ribbonPurple)" stroke-width="18" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
