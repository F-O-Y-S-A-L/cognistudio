<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Simple Icon 5: Minimalist Premium Stylized C-Wave Logo (প্রিমিয়াম মিনিমালিস্ট সি-ওয়েভ) -->
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" /> <!-- Warm Gold -->
      <stop offset="50%" stop-color="#EF4444" /> <!-- Red -->
      <stop offset="100%" stop-color="#EC4899" /> <!-- Pink -->
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="130" fill="#09090B" stroke="#27272A" stroke-width="4" />
  <g transform="translate(256, 256)">
    <!-- Outer thick smooth C curvature -->
    <path d="M 90,-110 A 130,130 0 1,0 90,110" fill="none" stroke="url(#cGrad)" stroke-width="36" stroke-linecap="round" />
    <!-- Inner glowing abstract wave crest -->
    <path d="M 40,-50 A 65,65 0 1,0 40,50" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>
